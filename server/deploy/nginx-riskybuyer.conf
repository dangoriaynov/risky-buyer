# nginx-proxy vhost for riskybuyer.com — mirrors the existing site pattern.
# Replace __APP_IP__ with the riskybuyer container IP (e.g. 10.48.230.x).
# TLS cert is issued with certbot (--nginx) after DNS points to the origin.

server {
    listen 80;
    server_name riskybuyer.com www.riskybuyer.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name riskybuyer.com www.riskybuyer.com;

    ssl_certificate /etc/letsencrypt/live/riskybuyer.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/riskybuyer.com/privkey.pem;

    client_max_body_size 10M;

    location / {
        proxy_pass http://__APP_IP__:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60;
    }
}

<!doctype html>

<head>
<meta charset="utf-8">

<title>Terms — RiskyBuyer</title>
<style>
  :root{--bg:#0b1020;--card:rgba(255,255,255,.045);--line:rgba(255,255,255,.10);--red:#e0413f;--text:#eaf0fb;--muted:#9aa6bd;--accent:#7cc4ff}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font:16px/1.7 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
  a{color:var(--accent);text-decoration:none}
  .wrap{max-width:760px;margin:0 auto;padding:0 22px}
  header{position:sticky;top:0;z-index:20;backdrop-filter:saturate(140%) blur(10px);background:rgba(11,16,32,.62);border-bottom:1px solid var(--line)}
  .bar{display:flex;align-items:center;height:62px;gap:12px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800}.brand svg{width:28px;height:28px}.sp{flex:1}
  .langs{display:flex;gap:3px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:3px}
  .langs button{all:unset;cursor:pointer;font:700 12px/1 inherit;color:var(--muted);padding:6px 11px;border-radius:999px;transition:.2s}
  .langs button.active{background:var(--red);color:#fff}.langs button:hover{color:#fff}
  .doc{padding:34px 0 70px}
  h1{font-size:30px;margin:6px 0 18px}
  h2{font-size:18px;margin:26px 0 6px}
  p{color:#d6deec;margin:0 0 8px}
  .back{color:var(--muted);font-size:14px}
  .upd{color:var(--muted);font-size:13px;margin-top:24px}
  footer{border-top:1px solid var(--line);padding:22px 0;color:var(--muted);font-size:14px}
  .frow{display:flex;flex-wrap:wrap;gap:16px;align-items:center}
</style>
</head>

  <div id="content"></div>
  <p class="upd" id="updated"></p>

function render(l){if(!T[l])l="bg";const d=T[l];document.documentElement.lang=l==="ua"?"uk":l;
 document.getElementById("home").textContent=d.home;document.getElementById("title").textContent=d.title;

 document.getElementById("content").innerHTML=d.sections.map(s=>"<h2>"+s[0]+"</h2><p>"+s[1]+"</p>").join("");
 document.querySelectorAll("#langs button").forEach(b=>b.classList.toggle("active",b.dataset.lang===l));
 try{localStorage.setItem("rb_lang",l)}catch(e){}}

</body>
</html>

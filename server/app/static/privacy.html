<style>

  *{box-sizing:border-box}html{scroll-behavior:smooth}

  p{color:var(--soft);margin:0 0 8px}

  footer{border-top:1px solid var(--line);padding:24px 0;color:var(--muted);font-size:14px}

 bg:{home:"Начало",lhome:"Начало",lterms:"Условия",title:"Политика за поверителност",updated:"Последна актуализация: юни 2026 г.",

 ua:{home:"Головна",lhome:"Головна",lterms:"Умови",title:"Політика приватності",updated:"Останнє оновлення: червень 2026 р.",

  ["Адміністратор і контакт","Адміністратор (контролер) даних — оператор RiskyBuyer (riskybuyer.com). Зв'язок: через форму на головній сторінці («Вважаєте, що вас внесли помилково?»). Ми не публікуємо e-mail, щоб обмежити спам; повідомлення з форми надходять безпосередньо оператору. Окрему особу з захисту даних (DPO) не призначено (не вимагається для цього обсягу)."],
  ["Які персональні дані ми обробляємо","Номер телефону та/або ім'я (як контактний ідентифікатор), причину (невикуплена / фейкова / образи / інше), коротку нотатку (за бажанням), домен магазину-джерела, статус і дату/час. Ми не обробляємо платіжні дані, адреси, ідентифікаційні номери чи спеціальні категорії даних."],
  ["Цілі обробки","Запобігання шахрайству, фейковим замовленням і невикупленим посилкам при накладеному платежі для малих онлайн-магазинів; зменшення збитків і чесніший сервіс для добросовісних клієнтів."],
  ["Правова підстава","Законний інтерес за ст. 6(1)(е) GDPR — магазинів та оператора щодо запобігання шахрайству. Магазини-джерела відповідають за наявність правової підстави згідно із застосовним правом."],
  ["Отримувачі даних","Авторизовані інсталяції плагіна RiskyBuyer (онлайн-магазини), які читають список для перевірки вхідних замовлень. Дані не продаються й не передаються іншим третім особам для інших цілей."],
  ["Строк зберігання","Записи зберігаються, доки актуальні для мети. Видалені записи позначаються й поширюються підписникам, щоб припинити збіги."],
  ["Ваші права","Ви маєте право на доступ, виправлення, видалення («право бути забутим»), обмеження обробки, заперечення та перенесення даних. Реалізувати їх можна через форму на головній сторінці; підтверджені запити опрацьовуються оперативно й безоплатно."],
  ["Право на скаргу","Ви маєте право подати скаргу до наглядового органу. У Болгарії це Комісія із захисту персональних даних (КЗЛД), м. Софія, cpdp.bg; або до органу у вашій країні."],

  ["Автоматизовані рішення","Запис є сигналом, а не автоматизованим рішенням із правовим ефектом. Остаточні рішення щодо замовлення ухвалює відповідний магазин (людина)."],
  ["Зміни","Цю політику може бути оновлено; зміни публікуються на цій сторінці."]
 ]},
 en:{home:"Home",lhome:"Home",lterms:"Terms",title:"Privacy Policy",updated:"Last updated: June 2026",
  intro:"This Policy explains what personal data the RiskyBuyer service (riskybuyer.com) processes, for what purposes, on what basis, for how long, and what rights you have — in line with Regulation (EU) 2016/679 (GDPR).",
  sections:[
  ["Controller & contact","The data controller is the operator of RiskyBuyer (riskybuyer.com). Contact us via the form on the home page (“Listed by mistake?”). We do not publish an e-mail address to limit spam; messages from the form reach the operator directly. No Data Protection Officer is appointed (not required at this scale)."],
  ["What personal data we process","A phone number and/or name (as a contact identifier), a reason (uncollected / fake / abusive / other), an optional short note, the domain of the reporting store, a status and a timestamp. We do not process payment data, addresses, national IDs or special categories of data."],
  ["Purposes","Preventing fraud, fake orders and uncollected cash-on-delivery parcels for small online stores; reducing losses and fairer service for honest customers."],
  ["Legal basis","Legitimate interest under Art. 6(1)(f) GDPR — of stores and the operator to prevent fraud. Reporting stores are responsible for having a lawful basis under applicable law."],
  ["Recipients","Authorized installations of the RiskyBuyer plugin (online stores) that read the list to check incoming orders. Data is not sold or shared with other third parties for other purposes."],
  ["Retention","Entries are kept while relevant to the purpose. Removed entries are flagged and propagated to subscribers so they stop matching."],
  ["Your rights","You have the right to access, rectification, erasure (“right to be forgotten”), restriction, objection and data portability. You can exercise them via the form on the home page; verified requests are handled promptly and free of charge."],
  ["Right to complain","You have the right to lodge a complaint with a supervisory authority — in Bulgaria, the Commission for Personal Data Protection (CPDP/КЗЛД), Sofia, cpdp.bg; or the authority in your country."],
  ["Cookies & tracking","We use no tracking cookies or third-party analytics. We only use browser local storage (localStorage) to remember your chosen language."],
  ["Automated decisions","An entry is a signal, not an automated decision with legal effect. Final order decisions are made by the relevant store (a human)."],
  ["Changes","This policy may be updated; changes are posted on this page."]
 ]}
};
function render(l){if(!T[l])l="bg";const d=T[l];document.documentElement.lang=l==="ua"?"uk":l;
 document.getElementById("home").textContent=d.home;document.getElementById("title").textContent=d.title;
 document.getElementById("intro").textContent=d.intro;document.getElementById("updated").textContent=d.updated;
 document.getElementById("lhome").textContent=d.lhome;document.getElementById("lterms").textContent=d.lterms;
 document.getElementById("content").innerHTML=d.sections.map(s=>"<h2>"+s[0]+"</h2><p>"+s[1]+"</p>").join("");
 document.querySelectorAll("#langs button").forEach(b=>b.classList.toggle("active",b.dataset.lang===l));
 try{localStorage.setItem("rb_lang",l)}catch(e){}}
document.getElementById("langs").addEventListener("click",e=>{const b=e.target.closest("button");if(b)render(b.dataset.lang)});
let s="bg";try{s=localStorage.getItem("rb_lang")||"bg"}catch(e){}render(s);
</script>

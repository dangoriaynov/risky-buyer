<!doctype html>
<html lang="bg">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RiskyBuyer</title>
<style>
  :root{
    --bg:#0b1020; --bg2:#0f172a; --card:rgba(255,255,255,.04); --line:rgba(255,255,255,.09);
    --red:#e0413f; --red2:#9b1c1c; --text:#e8edf6; --muted:#9aa6bd; --accent:#7cc4ff;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;line-height:1.65;-webkit-font-smoothing:antialiased}
  a{color:var(--accent);text-decoration:none}
  .wrap{max-width:960px;margin:0 auto;padding:0 22px}

  /* header */
  header{position:sticky;top:0;z-index:20;backdrop-filter:saturate(140%) blur(10px);background:rgba(11,16,32,.6);border-bottom:1px solid var(--line)}
  .bar{display:flex;align-items:center;gap:14px;height:64px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px}
  .brand svg{width:30px;height:30px}
  .spacer{flex:1}
  .langs{display:flex;gap:4px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:3px}
  .langs button{all:unset;cursor:pointer;font-size:12px;font-weight:700;color:var(--muted);padding:5px 11px;border-radius:999px;transition:.2s}
  .langs button.active{background:var(--red);color:#fff}
  .langs button:hover{color:#fff}

  /* hero */
  .hero{position:relative;overflow:hidden;padding:96px 0 80px;text-align:center}
  .hero::before{content:"";position:absolute;inset:-40% -10% auto -10%;height:520px;
    background:radial-gradient(60% 60% at 50% 0,rgba(224,65,63,.35),transparent 70%),
               radial-gradient(50% 50% at 20% 30%,rgba(124,196,255,.18),transparent 70%);
    animation:float 12s ease-in-out infinite;z-index:0}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(26px)}}
  .hero .wrap{position:relative;z-index:1}
  .shield{width:88px;height:88px;margin:0 auto 22px;filter:drop-shadow(0 12px 30px rgba(224,65,63,.45));animation:pop .7s cubic-bezier(.2,.8,.2,1) both}
  @keyframes pop{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
  h1{font-size:clamp(30px,5vw,52px);line-height:1.12;margin:0 0 16px;font-weight:850;letter-spacing:-.02em}
  .lead{font-size:clamp(16px,2.2vw,21px);color:var(--muted);max-width:680px;margin:0 auto 28px}
  .cta{display:inline-flex;gap:12px;flex-wrap:wrap;justify-content:center}
  .btn{display:inline-block;padding:13px 22px;border-radius:12px;font-weight:700;transition:.2s;border:1px solid transparent}
  .btn.primary{background:var(--red);color:#fff}
  .btn.primary:hover{background:#ef5350;transform:translateY(-2px)}
  .btn.ghost{border-color:var(--line);color:var(--text)}
  .btn.ghost:hover{border-color:var(--accent);transform:translateY(-2px)}

  /* sections */
  section.block{padding:34px 0}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:18px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px 24px;
    opacity:0;transform:translateY(26px);transition:opacity .6s ease,transform .6s ease}
  .card.in{opacity:1;transform:none}
  .card h2{margin:0 0 8px;font-size:20px}
  .card p{margin:0;color:var(--muted)}
  .ic{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;background:rgba(224,65,63,.14);margin-bottom:12px;font-size:22px}
  code{background:#0a0f1e;border:1px solid var(--line);padding:2px 7px;border-radius:6px;color:#cfe1ff}

  footer{border-top:1px solid var(--line);margin-top:40px;padding:26px 0;color:var(--muted);font-size:14px}
  footer .bar2{display:flex;flex-wrap:wrap;gap:14px;align-items:center}
</style>
</head>
<body>
<header>
  <div class="wrap bar">
    <div class="brand">
      <svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg"><rect width="256" height="256" rx="56" fill="#e0413f"/><path d="M128 44 L198 70 V126 C198 174 164 206 128 220 C92 206 58 174 58 126 V70 Z" fill="#fff"/><rect x="119" y="86" width="18" height="64" rx="9" fill="#9b1c1c"/><circle cx="128" cy="174" r="11" fill="#9b1c1c"/></svg>
      RiskyBuyer
    </div>
    <div class="spacer"></div>
    <div class="langs" id="langs">
      <button data-lang="bg">BG</button>
      <button data-lang="ua">UA</button>
      <button data-lang="en">EN</button>
    </div>
  </div>
</header>

<div class="hero">
  <div class="wrap">
    <svg class="shield" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg"><rect width="256" height="256" rx="56" fill="#e0413f"/><path d="M128 44 L198 70 V126 C198 174 164 206 128 220 C92 206 58 174 58 126 V70 Z" fill="#fff"/><rect x="119" y="86" width="18" height="64" rx="9" fill="#9b1c1c"/><circle cx="128" cy="174" r="11" fill="#9b1c1c"/></svg>
    <h1 data-i18n="hero_title"></h1>
    <p class="lead" data-i18n="hero_lead"></p>
    <div class="cta">
      <a class="btn primary" href="https://github.com/dangoriaynov/problem-client" data-i18n="cta_plugin"></a>
      <a class="btn ghost" href="#how" data-i18n="cta_how"></a>
    </div>
  </div>
</div>

<section class="block"><div class="wrap grid">
  <div class="card"><div class="ic">📋</div><h2 data-i18n="s1_t"></h2><p data-i18n="s1_b"></p></div>
  <div class="card" id="how"><div class="ic">🔌</div><h2 data-i18n="s2_t"></h2><p data-i18n="s2_b"></p></div>
  <div class="card"><div class="ic">🔒</div><h2 data-i18n="s3_t"></h2><p data-i18n="s3_b"></p></div>
</div></section>

<section class="block"><div class="wrap">
  <div class="card" style="text-align:center"><div class="ic" style="margin:0 auto 12px">⚙️</div>
    <h2 data-i18n="api_t"></h2>
    <p data-i18n="api_b"></p>
    <p style="margin-top:10px"><code>GET https://riskybuyer.com/v1/entries</code></p>
  </div>
</div></section>

<footer><div class="wrap bar2">
  <span>© RiskyBuyer</span><span class="spacer" style="flex:1"></span>
  <a href="/terms" data-i18n="f_terms"></a><a href="/privacy" data-i18n="f_privacy"></a>
</div></footer>

<script>
const I18N = {
  bg:{
    hero_title:"Спрете проблемните клиенти, преди да изпратите",
    hero_lead:"Споделен черен списък на рискови купувачи — фалшиви поръчки, неизкупени пратки, обиди — за WooCommerce магазини.",
    cta_plugin:"Вземи плъгина", cta_how:"Как работи",
    s1_t:"Какво е", s1_b:"RiskyBuyer е общностен списък на проблемни клиенти по телефон или име. Проверете входяща поръчка срещу споделения списък и отбележете рисковите купувачи преди изпращане.",
    s2_t:"Как се използва", s2_b:"Чрез безплатния плъгин Problem Client за WooCommerce. Отворете WooCommerce → Проблемни клиенти → Настройки и включете синхронизацията.",
    s3_t:"Поверителност и коректност", s3_b:"Списъкът съдържа само контактни идентификатори и кратка причина. Синхронизацията е по избор. Изтриване — по заявка.",
    api_t:"Отворен API", api_b:"Четенето на споделения списък е отворено. Записът изисква оторизиран API ключ.",
    f_terms:"Условия", f_privacy:"Поверителност"
  },
  ua:{
    hero_title:"Зупиніть проблемних клієнтів до відправлення",
    hero_lead:"Спільний чорний список ризикових покупців — фейкові замовлення, невикуплені посилки, образи — для WooCommerce-магазинів.",
    cta_plugin:"Отримати плагін", cta_how:"Як це працює",
    s1_t:"Що це", s1_b:"RiskyBuyer — спільнотний список проблемних клієнтів за телефоном або іменем. Перевіряйте вхідне замовлення проти спільного списку й позначайте ризикових покупців до відправлення.",
    s2_t:"Як користуватися", s2_b:"Через безкоштовний плагін Problem Client для WooCommerce. Відкрийте WooCommerce → Проблемні клієнти → Налаштування та увімкніть синхронізацію.",
    s3_t:"Приватність і чесність", s3_b:"Список містить лише контактні ідентифікатори та коротку причину. Синхронізація — за бажанням. Видалення — за запитом.",
    api_t:"Відкритий API", api_b:"Читання спільного списку відкрите. Запис потребує авторизованого API-ключа.",
    f_terms:"Умови", f_privacy:"Приватність"
  },
  en:{
    hero_title:"Stop problem customers before you ship",
    hero_lead:"A shared blacklist of risky buyers — fake orders, uncollected COD parcels, abusive behaviour — for WooCommerce stores.",
    cta_plugin:"Get the plugin", cta_how:"How it works",
    s1_t:"What it is", s1_b:"RiskyBuyer is a community list of problematic customers, keyed by phone or name. Check an incoming order against the shared list and flag risky buyers before shipping.",
    s2_t:"How to use it", s2_b:"Through the free Problem Client plugin for WooCommerce. Open WooCommerce → Problem clients → Settings and enable synchronization.",
    s3_t:"Privacy & fairness", s3_b:"The list holds only contact identifiers and a short reason. Synchronization is opt-in. Removal on request.",
    api_t:"Open API", api_b:"Reading the shared list is open. Writing requires an authorized API key.",
    f_terms:"Terms", f_privacy:"Privacy"
  }
};
function setLang(l){
  if(!I18N[l]) l="bg";
  document.documentElement.lang = l==="ua"?"uk":l;
  document.querySelectorAll("[data-i18n]").forEach(el=>{ const k=el.getAttribute("data-i18n"); if(I18N[l][k]!=null) el.textContent=I18N[l][k]; });
  document.querySelectorAll("#langs button").forEach(b=>b.classList.toggle("active", b.dataset.lang===l));
  try{ localStorage.setItem("rb_lang", l); }catch(e){}
}
document.getElementById("langs").addEventListener("click",e=>{ const b=e.target.closest("button"); if(b) setLang(b.dataset.lang); });
let saved="bg"; try{ saved=localStorage.getItem("rb_lang")||"bg"; }catch(e){}
setLang(saved);

// slide-in on scroll
const io=new IntersectionObserver(es=>es.forEach(en=>{ if(en.isIntersecting){ en.target.classList.add("in"); io.unobserve(en.target);} }),{threshold:.15});
document.querySelectorAll(".card").forEach((c,i)=>{ c.style.transitionDelay=(i%3*90)+"ms"; io.observe(c); });
</script>
</body>
</html>
